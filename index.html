<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的DeepSeek</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1a1a2e; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .user { background: #e4e4eb; align-self: flex-end; padding: 10px 14px; border-radius: 16px; }
        .bot { background: #1a1a2e; color: white; align-self: flex-start; padding: 10px 14px; border-radius: 16px; }
        .footer { display: flex; padding: 10px; gap: 10px; border-top: 1px solid #ddd; background: white; }
        .footer input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 10px 15px; font-size: 16px; }
        .footer button { background: #1a1a2e; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-weight: bold; }
        .loading { color: #888; font-size: 14px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">🤖 DeepSeek 助手</div>
    <div id="chatBox" class="chat"></div>
    <div class="footer">
        <input id="input" placeholder="输入问题..." />
        <button onclick="send()">发送</button>
    </div>
</div>

<!-- ⬇️ 你要替换的就是从下面这一整块开始（从 script 到 /script） -->
<script>
    // ⚠️ 把你的真实密钥填到下面的单引号里（保留两边的引号）
    const API_KEY = 'sk-f6ebe116291547409a66780f0a16764b';
    const MODEL = 'deepseek-v4-flash';
    const URL = 'https://api.deepseek.com/chat/completions';

    const chat = document.getElementById('chatBox');
    const input = document.getElementById('input');

    async function send() {
        const msg = input.value.trim();
        if (!msg) return;
        addMsg(msg, 'user');
        input.value = '';

        const load = document.createElement('div');
        load.className = 'bot loading';
        load.textContent = '正在思考...';
        chat.appendChild(load);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch(URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [{ role: 'user', content: msg }]
                })
            });
            load.remove();
            if (!res.ok) throw new Error('请求失败，请检查密钥');
            const data = await res.json();
            addMsg(data.choices[0].message.content, 'bot');
        } catch (e) {
            load.remove();
            addMsg('❌ 出错：' + e.message, 'bot');
        }
    }

    function addMsg(text, who) {
        const d = document.createElement('div');
        d.className = who;
        d.textContent = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
</script>
<!-- ⬆️ 到这里结束 -->
</body>
</html>
